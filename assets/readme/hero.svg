<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="100%" height="100%">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e5e7eb" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <filter id="fab-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#df37a7" flood-opacity="0.3"/>
    </filter>
    <clipPath id="base-clip">
      <rect width="1200" height="600" rx="24"/>
    </clipPath>
  </defs>

  <g id="base" clip-path="url(#base-clip)">
    <!-- Background -->
    <rect width="1200" height="600" fill="#f9fafb"/>
    <rect width="1200" height="600" fill="url(#grid)"/>

    <!-- Left side text -->
    <text x="80" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#1f2937" letter-spacing="-2">LinguaPop AI</text>
    <text x="80" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="500" fill="#4b5563">Your intelligent, context-aware translation</text>
    <text x="80" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="500" fill="#4b5563">and writing assistant.</text>

    <!-- Badges -->
    <g transform="translate(80, 400)">
      <rect width="160" height="36" rx="18" fill="#fce7f3"/>
      <text x="80" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#be185d" text-anchor="middle">Bring Your Own API</text>
    </g>
    <g transform="translate(255, 400)">
      <rect width="140" height="36" rx="18" fill="#e0e7ff"/>
      <text x="70" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#4338ca" text-anchor="middle">Local Fallback</text>
    </g>
    <g transform="translate(410, 400)">
      <rect width="120" height="36" rx="18" fill="#d1fae5"/>
      <text x="60" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#047857" text-anchor="middle">Privacy First</text>
    </g>

    <!-- Right side illustration (browser window with input) -->
    <g id="browser-window" transform="translate(620, 120)">
      <!-- Browser window -->
      <rect width="520" height="360" rx="16" fill="#ffffff" filter="url(#shadow)"/>
      
      <!-- Window header -->
      <path d="M 0 16 A 16 16 0 0 1 16 0 L 504 0 A 16 16 0 0 1 520 16 L 520 40 L 0 40 Z" fill="#f3f4f6"/>
      <circle cx="24" cy="20" r="6" fill="#ef4444"/>
      <circle cx="44" cy="20" r="6" fill="#eab308"/>
      <circle cx="64" cy="20" r="6" fill="#22c55e"/>

      <!-- Content area -->
      <g transform="translate(30, 70)">
        <text x="0" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#1f2937">New Message</text>
        
        <!-- Text input area -->
        <rect x="0" y="40" width="460" height="180" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
        
        <text x="16" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#374151">Привет! Подскажи, пожалуйста,</text>
        <text x="16" y="94" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#374151">в какое время лучше всего</text>
        <text x="16" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#374151">забронировать столик на вечер?</text>
        
        <!-- LinguaPop FAB -->
        <g id="fab" transform="translate(420, 182)" filter="url(#fab-shadow)">
          <circle cx="16" cy="16" r="16" fill="#df37a7"/>
          <path d="M12.5 10H16.5M16.5 10L14.5 14M16.5 10L18.5 14M10 8L15 8L14 10L9 10L8 12H13L12 14H7L6 16H4L8 8Z" fill="#ffffff" stroke="#ffffff" stroke-width="0.5"/>
        </g>
        
        <!-- Popup Menu -->
        <g id="popup-menu" transform="translate(260, 222)">
          <rect width="170" height="152" rx="12" fill="#ffffff" filter="url(#shadow)" stroke="#eaeaea" stroke-width="1"/>
          <rect x="4" y="4" width="162" height="28" rx="6" fill="#fce7f3"/>
          <text x="12" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#be185d">Обычный перевод</text>
          
          <text x="12" y="53" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#333">Формальный</text>
          <text x="12" y="83" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#333">Дружелюбный</text>
          <text x="12" y="113" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#333">Сделать короче</text>
          <text x="12" y="143" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#333">Только грамматика</text>
        </g>
      </g>
      
      <!-- Send Button -->
      <rect x="30" y="290" width="80" height="36" rx="18" fill="#2563eb"/>
      <text x="70" y="313" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Send</text>
    </g>
  </g>
</svg>
